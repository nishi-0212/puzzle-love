<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Our Puzzle</title>
    <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Solve Our Puzzle</h1>
            <p>Drag the pieces to reveal our moment</p>
        </div>

        <div class="game-wrapper">
            <canvas id="puzzleCanvas" width="1024" height="1024"></canvas>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
                <span class="progress-text" id="progressText">0%</span>
            </div>
        </div>

        <div class="completion-message" id="completionMessage">
            <div class="message-content">
                <h2>You Did It</h2>
                <p class="love-message">I love you my strong baby,<br>you are the best.</p>
                <button class="reset-btn" onclick="resetPuzzle()">Play Again</button>
            </div>
        </div>

        <div class="instructions">
            <p>Tip: Pieces snap to grid positions when dragged close</p>
        </div>
    </div>

    <script src="puzzle.js?v=3"></script>
</body>
</html>
